<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หมาล่าหมี - สั่งอาหาร</title>
  <meta name="description" content="สั่งอาหารร้านหม่าล่า ชาบู ออนไลน์">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* ── Table Selection ─────────────────────────────────────── */
    #table-select-screen {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,109,40,0.18) 0%, transparent 65%), var(--bg-primary);
    }
    .table-select-hero { text-align: center; margin-bottom: 40px; }
    .table-select-hero .logo { font-size: 3rem; margin-bottom: 8px; }
    .table-select-hero h1 { font-size: 2rem; margin-bottom: 6px; }
    .table-select-hero p { color: var(--text-secondary); }
    .tables-grid {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 12px; max-width: 480px; width: 100%;
    }
    .table-btn {
      aspect-ratio: 1; border-radius: var(--radius-md);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: var(--bg-card); border: 2px solid var(--border);
      cursor: pointer; transition: var(--transition);
      font-size: 1.2rem; font-weight: 700; color: var(--text-primary);
      font-family: inherit;
    }
    .table-btn:hover { border-color: var(--clr-brand); transform: scale(1.06); box-shadow: var(--shadow-brand); }
    .table-btn .table-icon { font-size: 1.4rem; }

    /* ── Theme Variables ─────────────────────────────────────── */
    #menu-screen {
      --m-bg: #fff;
      --m-bg-alt: #fafafa;
      --m-bg-act: #f5f5f5;
      --m-bd: #ddd;
      --m-bd-tk: #f0f0f0;
      --m-txt: #333;
      --m-txt-s: #666;
      --m-txt-m: #999;
      --m-tit: #111;
      --m-tit-s: #555;
      --m-prc: #444;
      --m-brnd: #008ba3;
    }
    #menu-screen.theme-dark {
      --m-bg: #0f0e17;
      --m-bg-alt: #1a1825;
      --m-bg-act: #231f38;
      --m-bd: rgba(255,255,255,0.08);
      --m-bd-tk: rgba(255,255,255,0.04);
      --m-txt: #f0ece8;
      --m-txt-s: #a89f9a;
      --m-txt-m: #6b6370;
      --m-tit: #fff;
      --m-tit-s: #d0c8c4;
      --m-prc: #cbd5e1;
      --m-brnd: #ff6d28;
    }

    /* ── Menu Page (Teenoi Style) ────────────────────────────── */
    #menu-screen { display: none; background: var(--m-bg); color: var(--m-txt); font-family: 'Noto Sans Thai', sans-serif; height: 100vh; overflow-y: auto; scroll-behavior: smooth; }
    
    .store-info-header { padding: 16px; border-bottom: 8px solid var(--m-bd-tk); background: var(--m-bg); text-align: left; }
    .store-info-header .top-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .logo-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ed1c24; object-fit: cover; }
    
    .store-details { margin-top: 14px; }
    .store-details h2 { font-size: 1.15rem; color: var(--m-tit); margin-bottom: 4px; font-weight: bold; }
    .detail-line { font-size: 0.85rem; color: var(--m-txt-s); margin-bottom: 2px; }
    .sub-detail { font-size: 0.85rem; color: var(--m-txt-m); margin-top: 4px; }
    
    .menu-title-bar { padding: 16px; background: var(--m-bg-alt); border-bottom: 1px solid var(--m-bd); text-align: left; display: flex; justify-content: space-between; align-items: center; }
    .menu-title-bar h3 { margin: 0; font-size: 1.05rem; color: var(--m-tit-s); font-weight: normal; }
    .theme-toggle-btn { background: none; border: 1px solid var(--m-bd); color: var(--m-tit); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    
    .category-tabs {
      display: flex; overflow-x: auto; position: sticky; top: 0; background: var(--m-bg-alt); z-index: 50;
      border-bottom: 1px solid var(--m-bd); scroll-behavior: smooth;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 14px 20px; border: none; background: none; font-size: 1rem; color: var(--m-tit-s);
      font-weight: bold; white-space: nowrap; cursor: pointer; border-bottom: 3px solid transparent; font-family: inherit;
    }
    .cat-btn.active { color: var(--m-tit); border-bottom-color: var(--m-txt-s); }
    
    .menu-list { background: var(--m-bg); padding-bottom: 100px; }
    .section-title { padding: 12px 16px; font-size: 1.15rem; font-weight: bold; color: var(--m-brnd); background: var(--m-bg-alt); margin: 0; text-align: left; }
    
    .menu-item-row {
      display: flex; padding: 16px; border-bottom: 1px solid var(--m-bd-tk); justify-content: space-between;
      cursor: pointer; align-items: flex-start; transition: background 0.2s; text-align: left;
    }
    .menu-item-row:active { background: var(--m-bg-act); }
    .menu-item-info { flex: 1; padding-right: 12px; }
    .menu-item-name { font-size: 0.98rem; font-weight: bold; color: var(--m-tit); margin-bottom: 4px; }
    .menu-item-desc { font-size: 0.85rem; color: var(--m-txt-s); margin-bottom: 8px; line-height: 1.3; }
    .menu-item-price { font-size: 0.9rem; color: var(--m-prc); }
    .menu-item-img {
      width: 80px; height: 80px; border-radius: 12px; object-fit: cover;
      border: 1px solid var(--m-bd); background: var(--m-bg-alt); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
    }
    
    /* ── Cart Drawer ─────────────────────────────────────────── */
    .cart-toggle {
      position: fixed; bottom: 24px; right: 24px; left: auto; transform: none; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: #1d8fb5; color: #fff; font-size: 1.6rem;
      border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(29,143,181,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s; font-family: inherit;
    }
    .cart-toggle:hover { transform: scale(1.05); }
    .cart-toggle.hidden { display: none; }
    .cart-count {
      position: absolute; top: -4px; right: -4px;
      background: #ef4444; color: #fff; border-radius: 50%;
      width: 24px; height: 24px; font-size: 0.8rem; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid #fff;
    }
    .cart-overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .cart-overlay.open { opacity: 1; pointer-events: all; }
    .cart-drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
      background: var(--bg-card); border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      border-top: 1px solid var(--border);
      max-height: 80vh; display: flex; flex-direction: column;
      transform: translateY(100%); transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .cart-drawer.open { transform: translateY(0); }
    .cart-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 12px auto 0; }
    .cart-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .cart-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .cart-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.92rem; }
    .cart-item-detail { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
    .cart-item-price { color: var(--clr-brand); font-weight: 700; font-size: 0.95rem; white-space: nowrap; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .qty-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg-secondary);
      color: var(--text-primary); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition); font-family: inherit;
    }
    .qty-btn:hover { border-color: var(--clr-brand); color: var(--clr-brand); }
    .qty-display { font-weight: 700; min-width: 20px; text-align: center; }
    .cart-footer { padding: 16px 20px; border-top: 1px solid var(--border); }
    .cart-total-row { display: flex; justify-content: space-between; font-size: 1.1rem; font-weight: 700; margin-bottom: 14px; }
    .cart-total-val { color: var(--clr-brand); }

    /* ── Customize Modal ─────────────────────────────────────── */
    .spice-options, .topping-options { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 16px; }
    .option-chip {
      padding: 8px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-secondary);
      cursor: pointer; transition: var(--transition);
      font-family: inherit; font-size: 0.84rem; color: var(--text-primary);
      text-align: left;
    }
    .option-chip:hover { border-color: var(--clr-brand); }
    .option-chip.selected { border-color: var(--clr-brand); background: rgba(255,109,40,0.15); color: var(--clr-brand); font-weight: 600; }
    .option-price { float: right; color: var(--clr-green); font-size: 0.8rem; }


    @media (max-width: 640px) {
      .tables-grid { grid-template-columns: repeat(4,1fr); }
    }
  </style>
</head>
<body>

<!-- ═══════════════ TABLE SELECT SCREEN ═══════════════ -->
<div id="table-select-screen">
  <div class="table-select-hero">
    <img src="/img/logo.png" alt="Logo" style="width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0 auto 12px;border:3px solid var(--clr-brand);" onerror="this.style.display='none'">
    <h1 data-i18n="brand">หมาล่าหมี</h1>
    <p data-i18n="select_table_desc">กรุณาเลือกหมายเลขโต๊ะของคุณก่อน</p>
  </div>
  <div class="lang-switcher" style="position:absolute;top:20px;right:20px;">
    <button class="lang-btn" data-lang="th">ไทย</button>
    <button class="lang-btn" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="zh">中</button>
  </div>
  <div class="tables-grid" id="tables-grid">
    <div style="grid-column:1/-1;text-align:center;padding:20px;"><div class="spinner" style="margin:auto;"></div></div>
  </div>
</div>

<!-- ═══════════════ MENU SCREEN ═══════════════════════ -->
<div id="menu-screen">
  <div class="store-info-header">
    <div class="top-row">
      <img src="/img/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
      <div class="lang-switcher" style="background:#f0f0f0; border-radius:20px; padding:4px;">
        <button class="lang-btn active" data-lang="th" onclick="document.querySelectorAll('.lang-switcher .lang-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">ไทย</button>
        <button class="lang-btn" data-lang="en" onclick="document.querySelectorAll('.lang-switcher .lang-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">EN</button>
        <button class="lang-btn" data-lang="zh" onclick="document.querySelectorAll('.lang-switcher .lang-btn').forEach(b=>b.classList.remove('active')); this.classList.add('active');">中</button>
      </div>
    </div>
    <div class="store-details">
      <h2>ร้าน หมาล่าหมี</h2>
      <div class="detail-line"><span>📍</span> ลาดกระบัง</div>
      <div class="detail-line" id="topbar-table-num">โต๊ะ: --</div>
      <div class="sub-detail">ร้าน หมาล่าหมี สาขา ลาดกระบัง</div>
    </div>
  </div>
  
  <div class="menu-title-bar">
    <h3>รายการเมนู (Menu_หมาล่าหมี)</h3>
    <button class="theme-toggle-btn" id="theme-toggle" onclick="document.getElementById('menu-screen').classList.toggle('theme-dark');">🌓 Theme</button>
  </div>

  <nav class="category-tabs" id="category-nav"></nav>
  
  <main class="menu-list" id="menu-main"></main>

  <button class="cart-toggle hidden" id="cart-toggle">
    📋
    <span class="cart-count" id="cart-count">0</span>
    <span id="cart-total-mini" style="display:none;"></span>
  </button>
</div>

<!-- ═══════════════ CART DRAWER ════════════════════════ -->
<div class="cart-overlay" id="cart-overlay"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-handle"></div>
  <div class="cart-header">
    <h3 data-i18n="cart">ตะกร้า</h3>
    <button class="btn-ghost" id="cart-close" style="font-size:1.4rem;background:none;border:none;color:var(--text-muted);cursor:pointer;">✕</button>
  </div>
  <div class="cart-body" id="cart-body"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span data-i18n="total">ยอดรวม</span>
      <span class="cart-total-val" id="cart-total">฿0</span>
    </div>
    <button class="btn btn-primary btn-full" id="place-order-btn" data-i18n="place_order">สั่งอาหาร</button>
  </div>
</div>

<!-- ═══════════════ CUSTOMIZE MODAL ═══════════════════ -->
<div class="modal-overlay" id="customize-overlay">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h3 class="modal-title" id="customize-title"></h3>
      <button class="modal-close" id="customize-close">✕</button>
    </div>
    <div style="padding: 0;">
      <div id="spice-section">
        <p class="label" data-i18n="spice_level">ระดับความเผ็ด</p>
        <div class="spice-options" id="spice-options"></div>
        <hr class="divider">
      </div>
      <div id="topping-section">
        <p class="label" data-i18n="toppings">ท็อปปิ้ง</p>
        <div class="topping-options" id="topping-options"></div>
        <hr class="divider">
      </div>
      <div>
        <label class="label" data-i18n="notes">หมายเหตุ</label>
        <textarea class="input textarea" id="item-notes" data-i18n-placeholder="notes_placeholder" rows="2"></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn btn-secondary" style="flex:1;" id="customize-cancel" data-i18n="cancel">ยกเลิก</button>
        <button class="btn btn-primary" style="flex:2;" id="customize-confirm" data-i18n="add_to_cart">เพิ่มลงตะกร้า</button>
      </div>
    </div>
  </div>
</div>


<script src="/static/js/i18n.js"></script>
<script>
  let selectedTable = null;
  let menuData = [];
  let spiceLevels = [];
  let toppings = [];
  let cart = [];
  let customizeItem = null;
  let selectedSpice = null;
  let selectedToppings = new Set();

  // ── Load tables ────────────────────────────────────────────
  async function loadTables() {
    const res = await fetch('/api/tables');
    const tables = await res.json();
    const grid = document.getElementById('tables-grid');
    grid.innerHTML = '';
    
    const urlParams = new URLSearchParams(window.location.search);
    const tblParam = urlParams.get('table');

    tables.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'table-btn';
      btn.innerHTML = `<span class="table-icon">🪑</span><span>${t.number}</span>`;
      btn.onclick = () => selectTable(t);
      grid.appendChild(btn);
      
      if (tblParam && parseInt(tblParam) === t.number) {
        setTimeout(() => selectTable(t), 50);
      }
    });
  }

  function selectTable(t) {
    selectedTable = t;
    document.getElementById('table-select-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'block';
    
    const tableEl = document.getElementById('topbar-table-num');
    if (tableEl) tableEl.textContent = `โต๊ะ: ${t.number}`;
    
    loadMenu();
  }

  // ── Load menu ──────────────────────────────────────────────
  async function loadMenu() {
    const [menuRes, spiceRes, toppingRes] = await Promise.all([
      fetch('/api/menu'), fetch('/api/spice-levels'), fetch('/api/toppings')
    ]);
    menuData = await menuRes.json();
    spiceLevels = await spiceRes.json();
    toppings = await toppingRes.json();
    renderSidebar();
    renderAllSections();
  }

  let isScrolling = false;
  let menuObserver = null;

  function renderSidebar() {
    const nav = document.getElementById('category-nav');
    nav.innerHTML = '';
    menuData.forEach((cat, i) => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
      btn.dataset.id = cat.id;
      btn.innerHTML = `<span>${I18N.itemName(cat)}</span>`;
      btn.onclick = () => {
        isScrolling = true;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const section = document.getElementById(`cat-section-${cat.id}`);
        if(section) {
          const menuScreen = document.getElementById('menu-screen');
          const navHeight = nav.offsetHeight;
          const targetY = section.offsetTop - navHeight;
          menuScreen.scrollTo({top: targetY, behavior: 'smooth'});
          
          btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          setTimeout(() => { isScrolling = false; }, 800);
        }
      };
      nav.appendChild(btn);
    });
  }

  function renderAllSections() {
    const main = document.getElementById('menu-main');
    main.innerHTML = '';
    
    if (menuObserver) menuObserver.disconnect();
    menuObserver = new IntersectionObserver((entries) => {
      if (isScrolling) return;
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id.replace('cat-section-', '');
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          const btn = document.querySelector(`.cat-btn[data-id="${id}"]`);
          if (btn) {
            btn.classList.add('active');
            btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          }
        }
      });
    }, { root: document.getElementById('menu-screen'), rootMargin: '-60px 0px -70% 0px' });

    menuData.forEach(cat => {
      const availItems = cat.items.filter(i => i.available);
      if (!availItems.length) return;
      
      const section = document.createElement('div');
      section.id = `cat-section-${cat.id}`;
      section.innerHTML = `<h2 class="section-title">${I18N.itemName(cat)}</h2>`;
      
      const list = document.createElement('div');
      availItems.forEach(item => {
        const row = document.createElement('div');
        row.className = 'menu-item-row';
        row.innerHTML = `
          <div class="menu-item-info">
            <div class="menu-item-name">${I18N.itemName(item)}</div>
            ${I18N.itemDesc(item) ? `<div class="menu-item-desc">${I18N.itemDesc(item)}</div>` : ''}
            <div class="menu-item-price">${item.price} บาท</div>
          </div>
          <div class="menu-item-img">
            ${item.image_url ? `<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" onerror="this.style.display='none';this.parentElement.innerHTML='🍽️'">` : '🍽️'}
          </div>
        `;
        row.onclick = () => openCustomize(item, cat);
        list.appendChild(row);
      });
      section.appendChild(list);
      main.appendChild(section);
      menuObserver.observe(section);
    });
  }

  document.addEventListener('langChange', () => { renderSidebar(); renderAllSections(); renderCart(); });

  // ── Customize Modal ────────────────────────────────────────
  function openCustomize(item, cat) {
    customizeItem = item;
    selectedSpice = null;
    selectedToppings = new Set();
    document.getElementById('customize-title').textContent = I18N.itemName(item);
    document.getElementById('item-notes').value = '';

    // Spice options
    const spiceOptions = document.getElementById('spice-options');
    spiceOptions.innerHTML = '';
    spiceLevels.forEach(sl => {
      const chip = document.createElement('button');
      chip.className = 'option-chip';
      chip.innerHTML = `${I18N.itemName(sl)}<span class="option-price">${sl.extra_price > 0 ? '+฿'+sl.extra_price : ''}</span>`;
      chip.onclick = () => {
        document.querySelectorAll('#spice-options .option-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        selectedSpice = sl;
      };
      spiceOptions.appendChild(chip);
    });

    // Topping options
    const toppingOptions = document.getElementById('topping-options');
    toppingOptions.innerHTML = '';
    toppings.forEach(tp => {
      const chip = document.createElement('button');
      chip.className = 'option-chip';
      chip.innerHTML = `${I18N.itemName(tp)}<span class="option-price">+฿${tp.price}</span>`;
      chip.onclick = () => {
        chip.classList.toggle('selected');
        selectedToppings.has(tp.id) ? selectedToppings.delete(tp.id) : selectedToppings.add(tp.id);
      };
      toppingOptions.appendChild(chip);
    });

    document.getElementById('customize-overlay').classList.add('active');
  }

  document.getElementById('customize-close').onclick = closeCustomize;
  document.getElementById('customize-cancel').onclick = closeCustomize;
  document.getElementById('customize-overlay').onclick = (e) => { if (e.target === e.currentTarget) closeCustomize(); };

  function closeCustomize() {
    document.getElementById('customize-overlay').classList.remove('active');
    customizeItem = null;
  }

  document.getElementById('customize-confirm').onclick = () => {
    if (!customizeItem) return;
    const tp = toppings.filter(t => selectedToppings.has(t.id));
    const tpPrice = tp.reduce((s, t) => s + t.price, 0);
    const spicePrice = selectedSpice?.extra_price || 0;
    const unitPrice = customizeItem.price + spicePrice + tpPrice;
    cart.push({
      menu_item_id: customizeItem.id,
      name: I18N.itemName(customizeItem),
      image_url: customizeItem.image_url,
      unit_price: unitPrice,
      base_price: customizeItem.price,
      spice_level_id: selectedSpice?.id || null,
      spice_name: selectedSpice ? I18N.itemName(selectedSpice) : null,
      toppings: tp.map(t => ({ topping_id: t.id, name: I18N.itemName(t), price: t.price })),
      notes: document.getElementById('item-notes').value.trim(),
      quantity: 1,
    });
    closeCustomize();
    updateCartBadge();
    renderCart();
    showToast(`${I18N.itemName(customizeItem)} ${I18N.t('add_to_cart')} ✅`, 'success', 2000);
  };

  // ── Cart ───────────────────────────────────────────────────
  function updateCartBadge() {
    const total = cart.reduce((s, i) => s + i.unit_price * i.quantity, 0);
    const count = cart.reduce((s, i) => s + i.quantity, 0);
    document.getElementById('cart-count').textContent = count;
    document.getElementById('cart-total-mini').textContent = '฿' + total.toFixed(0);
    const toggle = document.getElementById('cart-toggle');
    toggle.classList.toggle('hidden', count === 0);
  }

  function renderCart() {
    const body = document.getElementById('cart-body');
    if (cart.length === 0) {
      body.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p data-i18n="cart_empty">${I18N.t('cart_empty')}</p></div>`;
    } else {
      body.innerHTML = '';
      cart.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'cart-item';
        const details = [];
        if (item.spice_name) details.push('🌶️ ' + item.spice_name);
        if (item.toppings.length) details.push('🍴 ' + item.toppings.map(t => t.name).join(', '));
        if (item.notes) details.push('📝 ' + item.notes);
        el.innerHTML = `
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            ${details.length ? `<div class="cart-item-detail">${details.join(' · ')}</div>` : ''}
            <div class="qty-ctrl">
              <button class="qty-btn" data-idx="${idx}" data-dir="-1">−</button>
              <span class="qty-display">${item.quantity}</span>
              <button class="qty-btn" data-idx="${idx}" data-dir="1">+</button>
            </div>
          </div>
          <div class="cart-item-price">฿${(item.unit_price * item.quantity).toFixed(0)}</div>`;
        body.appendChild(el);
      });
      body.querySelectorAll('.qty-btn').forEach(btn => {
        btn.onclick = () => {
          const idx = +btn.dataset.idx;
          const dir = +btn.dataset.dir;
          cart[idx].quantity += dir;
          if (cart[idx].quantity <= 0) cart.splice(idx, 1);
          updateCartBadge(); renderCart();
        };
      });
    }
    const total = cart.reduce((s, i) => s + i.unit_price * i.quantity, 0);
    document.getElementById('cart-total').textContent = '฿' + total.toFixed(0);
  }

  document.getElementById('cart-toggle').onclick = openCart;
  document.getElementById('cart-overlay').onclick = closeCart;
  document.getElementById('cart-close').onclick = closeCart;

  function openCart() {
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-drawer').classList.add('open');
    renderCart();
  }
  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-drawer').classList.remove('open');
  }

  // ── Place Order ────────────────────────────────────────────
  document.getElementById('place-order-btn').onclick = async () => {
    if (!cart.length) return;
    const btn = document.getElementById('place-order-btn');
    btn.disabled = true; btn.textContent = I18N.t('loading');

    const payload = {
      table_id: selectedTable.id,
      items: cart.map(i => ({
        menu_item_id: i.menu_item_id,
        spice_level_id: i.spice_level_id,
        quantity: i.quantity,
        notes: i.notes,
        toppings: i.toppings.map(t => ({ topping_id: t.topping_id })),
      }))
    };

    try {
      const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (!res.ok) throw new Error('Failed');
      const order = await res.json();
      localStorage.setItem('malaflow_order_id', order.id);
      localStorage.setItem('malaflow_table', JSON.stringify(selectedTable));
      closeCart();
      window.location.href = `/order-status?order_id=${order.id}`;
    } catch (e) {
      showToast(I18N.t('error'), 'error');
      btn.disabled = false; btn.textContent = I18N.t('place_order');
    }
  };

  loadTables();
</script>
</body>
</html>
